name: Sync Webapp to Free Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Git and Assemble Browser App
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "git-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 1. Clone the Hugging Face Container
          git clone https://nityathota:$HF_TOKEN@huggingface.co/spaces/nityathota/nhs-triage-fairness-optimiser hf_space
          rm -rf hf_space/*
          
          # 2. Extract your Python source code files into environment variables
          CORE_MATH=$(cat webapp/fairness_core.py)
          APP_INTERFACE=$(cat webapp/app.py)
          DATA_ROWS=$(cat webapp/example_data.csv)
          
          # 3. Assemble the deployment file injection layout dynamically
          cat << EOF > hf_space/index.html
          <html>
          <head>
              <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/@gradio/lite/dist/lite.js"></script>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gradio/lite/dist/lite.css" />
          </head>
          <body>
              <gradio-lite>
                  <gradio-requirements>
                      numpy
                      scipy
                      scikit-learn
                      pandas
                      matplotlib
                  </gradio-requirements>
                  <gradio-file name="fairness_core.py">
          $CORE_MATH
                  </gradio-file>
                  <gradio-file name="example_data.csv">
          $DATA_ROWS
                  </gradio-file>
                  <gradio-file name="app.py" entrypoint>
          $APP_INTERFACE
                  </gradio-file>
              </gradio-lite>
          </body>
          </html>
          EOF
          
          # 4. Generate the required configuration headers for the free Static Space
          cat << 'EOF' > hf_space/README.md
          ---
          title: nhs-triage-fairness-optimiser
          emoji: ⚖️
          colorFrom: blue
          colorTo: green
          sdk: static
          pinned: false
          license: mit
          ---
          # NHS Triage Fairness Optimiser Deployed App
          This interface runs serverless Python algorithms natively inside the browser via Gradio-Lite.
          EOF
          
                    # 5. Automatically write the required browser metadata to the Space header
          cat << 'EOF' > hf_space/README.md
          ---
          title: nhs-triage-fairness-optimiser
          emoji: ⚖️
          colorFrom: blue
          colorTo: green
          sdk: static
          pinned: true
          license: mit
          ---
          # NHS Triage Fairness Optimiser Deployed App
          This interface executes serverless Python algorithms natively inside the browser via Gradio-Lite.
          EOF
