name: Sync Webapp to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Push webapp folder to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://nityathota:$HF_TOKEN@huggingface.co/spaces/nityathota/nhs-triage-fairness-optimiser hf_space
          rm -rf hf_space/*.py hf_space/*.txt hf_space/*.csv hf_space/README.md

          # Copy the REAL app files as-is - Gradio SDK runs Python natively
          cp webapp/app.py hf_space/app.py
          cp webapp/fairness_core.py hf_space/fairness_core.py
          cp webapp/requirements.txt hf_space/requirements.txt
          cp webapp/example_data.csv hf_space/example_data.csv
          cp webapp/README.md hf_space/README.md

          cd hf_space
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Sync from GitHub: $(date +%Y-%m-%d_%H:%M)"
            git push origin main
          else
            echo "No changes to sync."
          fi