name: Sync Webapp to Free Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Git and Assemble Browser App
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "git-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 1. Clone the Hugging Face Container securely
          git clone https://nityathota:$HF_TOKEN@huggingface.co/spaces/nityathota/nhs-triage-fairness-optimiser hf_space
          rm -rf hf_space/*
          
          # 2. Extract your production Python source code blocks into variables
          CORE_MATH=$(cat webapp/fairness_core.py)
          APP_INTERFACE=$(cat webapp/app.py)
          DATA_ROWS=$(cat webapp/example_data.csv)
          
          # 3. Assemble a clean single-file browser runner using the stable serverless client
          cat << EOF > hf_space/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>NHS Triage Fairness Optimiser</title>
              <script type="module" crossorigin src="https://jsdelivr.net"></script>
              <link rel="stylesheet" href="https://jsdelivr.net" />
          </head>
          <body>
              <gradio-lite type="app">
                  <gradio-requirements>
                      numpy==1.26.4
                      pandas==2.2.2
                      scikit-learn==1.5.1
                      matplotlib==3.9.0
                      scipy==1.12.0
                  </gradio-requirements>
                  <gradio-file name="fairness_core.py">
          $CORE_MATH
                  </gradio-file>
                  <gradio-file name="example_data.csv">
          $DATA_ROWS
                  </gradio-file>
                  <gradio-file name="app.py" entrypoint>
          $APP_INTERFACE
                  </gradio-file>
              </gradio-lite>
          </body>
          </html>
          EOF
          
          # 4. Generate the un-capped configurations for the Static Space
          cat << 'EOF' > hf_space/README.md
          ---
          title: nhs-triage-fairness-optimiser
          emoji: ⚖️
          colorFrom: blue
          colorTo: green
          sdk: static
          pinned: true
          license: mit
          ---
          # NHS Triage Fairness Optimiser Deployed App
          This interface executes serverless Python algorithms natively inside the browser via Gradio-Lite.
          EOF
          
          # 5. Push structural assets back to the cloud
          cd hf_space
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "fix: hardcode serverless environment wrapper to clear pip wheel crashes"
            git push origin main
          else
            echo "No changes detected. Skipping sync."
          fi
